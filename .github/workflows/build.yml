name: "publish"
on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/build.yml"
      - "package.json"
      - "package-lock.json"
      - "vite.config.ts"
      - "tsconfig.json"
      - "tsconfig.node.json"
      - "index.html"
      - "src/**"
      - "src-tauri/**"

jobs:
  publish:
    permissions:
      contents: write
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: install frontend dependencies
        run: npm ci

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: app-v__VERSION__
          releaseName: "Salgados Pro v__VERSION__"
          releaseBody: "Build automático gerado pelo GitHub Actions."
          releaseDraft: true
          prerelease: false
          args: --target x86_64-pc-windows-msvc
